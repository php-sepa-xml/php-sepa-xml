# Please see the documentation for all configuration options:
# https://help.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    target-branch: master
    commit-message:
      prefix: "DPs: "
      prefix-development: "DPs-dev: "
      include: "scope"
    labels:
      - "dependabot"
    assignees:
      - "BorislavSabev"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    target-branch: master
    commit-message:
      prefix: "GHAs: "
      include: "scope"
    labels:
      - "dependencies"
    reviewers:
      - "BorislavSabev"
    assignees:
      - "BorislavSabev"
